<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>讨论区</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none;
        }
        
        /* 继承你原版的极简滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 h-[100dvh] w-full flex flex-col overflow-hidden select-none">

    <header class="bg-white/90 backdrop-blur-md border-b border-gray-200 flex items-center justify-between px-4 shrink-0 z-40 h-[60px]">
        <div class="flex items-center gap-3 w-1/4"></div>
        <div class="flex-1 text-center">
            <h2 class="text-[17px] font-bold text-slate-800">页面讨论区</h2>
        </div>
        <div class="flex items-center justify-end gap-2 w-1/4">
            <button onclick="toggleAdmin()" class="p-2 text-slate-400 active:bg-slate-100 rounded-full transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
        
        <div class="bg-white p-4 rounded-2xl mb-6 shadow-sm border border-slate-100">
            <div class="flex gap-3 mb-3">
                <img id="previewAvatar" src="https://q1.qlogo.cn/g?b=qq&nk=10000&s=100" class="w-10 h-10 rounded-full border border-slate-100 shadow-sm bg-slate-50 shrink-0 object-cover">
                <div class="flex-1 flex gap-2">
                    <input type="text" id="inputName" placeholder="昵称" class="w-1/2 bg-slate-50 p-2.5 rounded-xl border border-slate-200 text-[13px] outline-none focus:border-blue-500 transition-colors">
                    <input type="number" id="inputQQ" placeholder="QQ号" onblur="updateAvatar()" class="w-1/2 bg-slate-50 p-2.5 rounded-xl border border-slate-200 text-[13px] outline-none focus:border-blue-500 transition-colors">
                </div>
            </div>
            
            <textarea id="inputContent" rows="3" placeholder="说点什么吧..." class="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 text-[13px] outline-none focus:border-blue-500 transition-colors mb-3 resize-none custom-scrollbar"></textarea>
            
            <div class="flex items-center justify-between border-t border-slate-50 pt-3">
                <div class="flex items-center gap-3 text-[18px]">
                    <span onclick="insertEmoji('😀')" class="cursor-pointer active:scale-110 transition-transform">😀</span>
                    <span onclick="insertEmoji('😂')" class="cursor-pointer active:scale-110 transition-transform">😂</span>
                    <span onclick="insertEmoji('😍')" class="cursor-pointer active:scale-110 transition-transform">😍</span>
                    <span onclick="insertEmoji('👍')" class="cursor-pointer active:scale-110 transition-transform">👍</span>
                    <span onclick="insertEmoji('🎉')" class="cursor-pointer active:scale-110 transition-transform">🎉</span>
                </div>
                
                <button onclick="submitComment()" id="submitBtn" class="px-5 py-2 bg-blue-600 text-white rounded-xl text-[13px] font-bold shadow-sm shadow-blue-600/20 active:bg-blue-700 active:scale-95 transition-all flex items-center gap-1.5">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    发送
                </button>
            </div>
        </div>

        <div class="px-1 py-3 text-xs font-bold text-slate-400 uppercase tracking-widest bg-gray-50 flex items-center justify-between">
            <span>最新评论</span>
            <span id="commentCount" class="text-[10px] bg-slate-200 text-slate-500 px-2 py-0.5 rounded-full">演示数据</span>
        </div>

        <div id="commentList" class="space-y-3 pb-10">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-3 active:bg-slate-50 transition-colors">
                <img src="https://q1.qlogo.cn/g?b=qq&nk=10000&s=100" class="w-10 h-10 rounded-full border border-slate-100 shadow-sm shrink-0">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-[13px] font-bold text-slate-700 truncate">云端旅行者</span>
                        <span class="text-[10px] font-bold text-slate-400">刚刚</span>
                    </div>
                    <p class="text-[13px] text-slate-600 leading-relaxed break-words whitespace-pre-wrap">UI 完美契合！这套圆角和阴影配合你的主题绝了 🎉👍</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-3 active:bg-slate-50 transition-colors">
                <img src="https://q1.qlogo.cn/g?b=qq&nk=10001&s=100" class="w-10 h-10 rounded-full border border-slate-100 shadow-sm shrink-0">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-[13px] font-bold text-slate-700 truncate">前端小怪兽</span>
                        <span class="text-[10px] font-bold text-slate-400">2小时前</span>
                    </div>
                    <p class="text-[13px] text-slate-600 leading-relaxed break-words whitespace-pre-wrap">这个轻量化方案太省事了，连数据库都在 Cloudflare 免费解决，手机端用起来也很丝滑~</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 【关键配置】把这里换成你的 Worker 域名
        const API_URL = "https://你的WORKER域名.workers.dev/api/comments";
        let adminPassword = null;

        // QQ 头像自动获取
        function updateAvatar() {
            const qq = document.getElementById('inputQQ').value.trim();
            const avatarEl = document.getElementById('previewAvatar');
            if(qq) {
                avatarEl.src = `https://q1.qlogo.cn/g?b=qq&nk=${qq}&s=100`;
            } else {
                avatarEl.src = "https://q1.qlogo.cn/g?b=qq&nk=10000&s=100";
            }
        }

        // 插入 Emoji
        function insertEmoji(emoji) {
            const textarea = document.getElementById('inputContent');
            textarea.value += emoji;
            textarea.focus();
        }

        // 时间格式化小工具
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}-${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        // 异步加载评论列表
        async function loadComments() {
            // 如果你没有配置真实域名，这里防止报错拦截，保留静态展示
            if (API_URL.includes("你的WORKER域名")) return;

            const listEl = document.getElementById('commentList');
            const countEl = document.getElementById('commentCount');
            listEl.innerHTML = `<div class="flex flex-col items-center justify-center py-10"><div class="w-6 h-6 border-2 border-slate-200 border-t-blue-600 rounded-full animate-spin mb-2"></div><p class="text-[11px] font-bold text-slate-400">读取中...</p></div>`;
            
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("API 异常");
                const comments = await res.json();
                
                countEl.innerText = comments.length;

                if (comments.length === 0) {
                    listEl.innerHTML = '<div class="text-center py-10 text-[12px] font-bold text-slate-400">暂无评论，来抢沙发吧</div>';
                    return;
                }

                listEl.innerHTML = comments.map(c => {
                    const avatarUrl = c.qq ? `https://q1.qlogo.cn/g?b=qq&nk=${c.qq}&s=100` : `https://q1.qlogo.cn/g?b=qq&nk=10000&s=100`;
                    
                    const deleteBtnHtml = adminPassword ? 
                        `<button onclick="deleteComment(${c.id})" class="p-1 text-red-400 active:text-red-600 ml-2 rounded"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>` : '';

                    return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-3 active:bg-slate-50 transition-colors">
                        <img src="${avatarUrl}" class="w-10 h-10 rounded-full border border-slate-100 shadow-sm shrink-0 bg-slate-50">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-[13px] font-bold text-slate-700 truncate">${c.name}</span>
                                <div class="flex items-center">
                                    <span class="text-[10px] font-bold text-slate-400">${formatDate(c.created_at)}</span>
                                    ${deleteBtnHtml}
                                </div>
                            </div>
                            <p class="text-[13px] text-slate-600 leading-relaxed break-words whitespace-pre-wrap">${c.content}</p>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                listEl.innerHTML = '<div class="text-center py-10 text-[12px] font-bold text-red-400">加载失败，请检查 Worker 配置</div>';
            }
        }

        // 发送评论
        async function submitComment() {
            const name = document.getElementById('inputName').value.trim();
            const qq = document.getElementById('inputQQ').value.trim();
            const content = document.getElementById('inputContent').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!name) return alert("写个昵称吧");
            if (!content) return alert("内容不能为空哦");

            // 还原你的加载按钮动画
            btn.innerHTML = `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>发送中`;
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, qq, content })
                });
                document.getElementById('inputContent').value = '';
                await loadComments();
            } catch (e) {
                alert("发送失败，请检查网络！");
            } finally {
                btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>发送`;
                btn.disabled = false;
            }
        }

        // 隐藏的管理员逻辑
        function toggleAdmin() {
            if (adminPassword) {
                adminPassword = null;
                alert("已退出管理模式");
            } else {
                const pwd = prompt("管理员密码：");
                if (pwd === "5280") {
                    adminPassword = pwd;
                    alert("管理模式已开启");
                } else if(pwd) {
                    alert("密码错误");
                }
            }
            loadComments();
        }

        // 管理员删除 API 调用
        async function deleteComment(id) {
            if (!confirm("永久删除这条评论？")) return;
            try {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Admin-Key': adminPassword }
                });
                if (res.ok) {
                    loadComments();
                } else {
                    alert("删除失败");
                    adminPassword = null;
                    loadComments();
                }
            } catch (e) {
                alert("请求失败");
            }
        }

        // 初始化
        setTimeout(() => loadComments(), 500);
    </script>
</body>
</html>
